<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Plugin for Moodle — Student</title>
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --o1: #fb9026; --o2: #ff6b35; --o3: #ffb366;
  --pale: #fff7ed; --soft: #ffe8cc; --border: #ffd9b2;
  --white: #ffffff; --surface: #fafaf8;
  --dark: #1a1207; --body: #4a4035; --muted: #9a8878;
  --card-r: 20px; --nav-h: 68px;
  --green: #059669; --green-soft: #d1fae5; --green-border: #a7f3d0;
  --blue: #2563eb; --blue-soft: #dbeafe;
  --red: #dc2626; --red-soft: #fee2e2;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', system-ui, sans-serif; background: var(--surface); color: var(--dark); min-height: 100vh; }

/* TOPBAR */
.topbar { height: var(--nav-h); padding: 0 40px; display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.96); backdrop-filter: blur(12px); border-bottom: 1px solid var(--soft); position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 20px rgba(251,144,38,0.08); }
.brand { display: flex; align-items: center; gap: 10px; cursor: pointer; text-decoration: none; }
.brand-mark { width: 38px; height: 38px; background: linear-gradient(135deg, var(--o1), var(--o2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(251,144,38,0.35); }
.brand-mark i { color: white; font-size: 20px; }
.brand-name { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 17px; font-weight: 800; color: var(--dark); letter-spacing: -0.02em; }
.brand-name span { background: linear-gradient(135deg, var(--o1), var(--o2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.topnav { display: flex; align-items: center; gap: 4px; list-style: none; }
.topnav .link { background: none; border: none; padding: 8px 16px; font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif; color: var(--body); border-radius: 8px; cursor: pointer; transition: all .2s; }
.topnav .link:hover { background: var(--pale); color: var(--o1); }
.topnav .link.active { background: linear-gradient(135deg, var(--o1), var(--o2)); color: white; box-shadow: 0 3px 10px rgba(251,144,38,0.3); }

/* MAIN WRAP */
main { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }

/* PAGE HEADER */
.page-header { margin-bottom: 32px; }
.page-header h2 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 26px; font-weight: 800; color: var(--dark); letter-spacing: -0.025em; }
.page-header p { color: var(--muted); font-size: 14px; margin-top: 5px; }

/* SECTION */
.content-section { display: none; }
.content-section.active { display: block; }

/* LOADING */
.loading-wrap { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 60px 24px; color: var(--muted); font-size: 14px; font-weight: 500; }
.spinner { width: 28px; height: 28px; border: 3px solid var(--soft); border-top-color: var(--o1); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 64px 24px; background: white; border: 1.5px dashed var(--soft); border-radius: var(--card-r); }
.empty-state i { font-size: 44px; color: var(--border); display: block; margin-bottom: 14px; }
.empty-state h3 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 17px; font-weight: 800; color: var(--dark); margin-bottom: 6px; }
.empty-state p { color: var(--muted); font-size: 14px; }

/* ERROR */
.error-box { background: var(--red-soft); border: 1px solid #fca5a5; color: var(--red); padding: 14px 18px; border-radius: 12px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 10px; }

/* ITEMS GRID */
.items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

/* QUIZ / ASSIGNMENT CARD */
.item-card { background: white; border: 1.5px solid var(--soft); border-radius: var(--card-r); padding: 24px; transition: all .3s cubic-bezier(.34,1.56,.64,1); position: relative; overflow: hidden; display: flex; flex-direction: column; gap: 14px; }
.item-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--o1), var(--o2)); opacity: 0; transition: opacity .3s; }
.item-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(251,144,38,0.14); border-color: var(--o3); }
.item-card:hover::before { opacity: 1; }

.item-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.item-icon { width: 46px; height: 46px; background: var(--pale); border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.item-icon i { font-size: 22px; color: var(--o1); }
.item-badge { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 999px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
.badge-quiz { background: var(--pale); color: #92400e; border: 1px solid var(--border); }
.badge-assignment { background: var(--blue-soft); color: var(--blue); border: 1px solid #bfdbfe; }
.badge-expired { background: var(--red-soft); color: var(--red); border: 1px solid #fca5a5; }

.item-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px; font-weight: 800; color: var(--dark); line-height: 1.3; }

.item-meta { display: flex; flex-wrap: wrap; gap: 8px; }
.meta-chip { display: inline-flex; align-items: center; gap: 5px; background: var(--surface); border: 1px solid var(--soft); border-radius: 8px; padding: 4px 10px; font-size: 12px; color: var(--body); font-weight: 500; }
.meta-chip i { color: var(--o1); font-size: 13px; }
.meta-chip.expired { background: var(--red-soft); border-color: #fca5a5; color: var(--red); }
.meta-chip.expired i { color: var(--red); }

.item-note { background: var(--pale); border-left: 3px solid var(--o1); border-radius: 0 8px 8px 0; padding: 8px 12px; font-size: 13px; color: var(--body); line-height: 1.5; }

.item-action { margin-top: auto; }
.take-btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px 20px; background: linear-gradient(135deg, var(--o1), var(--o2)); color: white; border: none; border-radius: 12px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; text-decoration: none; transition: all .3s; box-shadow: 0 4px 14px rgba(251,144,38,0.28); }
.take-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(251,144,38,0.38); }
.take-btn.disabled { background: var(--soft); color: var(--muted); box-shadow: none; cursor: not-allowed; pointer-events: none; }

/* GRADES */
.grade-group { margin-bottom: 36px; }
.grade-group-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px; font-weight: 800; color: var(--dark); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.grade-group-title::after { content: ''; flex: 1; height: 1.5px; background: var(--soft); }

.grade-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }

.grade-card { background: white; border: 1.5px solid var(--soft); border-radius: var(--card-r); padding: 20px; transition: all .25s ease; }
.grade-card:hover { border-color: var(--o3); box-shadow: 0 8px 24px rgba(251,144,38,0.1); }

.grade-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
.grade-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px; font-weight: 700; color: var(--dark); line-height: 1.3; }
.grade-score-badge { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 20px; font-weight: 900; color: var(--o1); white-space: nowrap; }

.grade-meta { color: var(--muted); font-size: 13px; margin-bottom: 14px; }
.grade-bar { height: 6px; background: var(--soft); border-radius: 999px; overflow: hidden; margin-bottom: 14px; }
.grade-bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--o1), var(--o2)); }

.view-btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; background: white; border: 1.5px solid var(--soft); border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; color: var(--body); text-decoration: none; transition: all .2s; }
.view-btn:hover { border-color: var(--o1); color: var(--o1); }

/* RESPONSIVE */
@media (max-width: 700px) {
  .topbar { padding: 0 16px; }
  main { padding: 24px 16px 60px; }
  .items-grid { grid-template-columns: 1fr; }
  .grade-cards { grid-template-columns: 1fr; }
  .topnav .link { padding: 7px 10px; font-size: 13px; }
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--pale); }
::-webkit-scrollbar-thumb { background: var(--o3); border-radius: 99px; }
</style>
</head>
<body>

<nav class="topbar" role="navigation">
  <a class="brand" href="#">
    <div class="brand-mark"><i class='bx bx-brain'></i></div>
    <div class="brand-name">Quiz<span>Gen AI</span></div>
  </a>
  <ul class="topnav" id="topnav">
    <li><button class="link active" data-route="quizzes"><i class='bx bx-list-check'></i> Quizzes</button></li>
    <li><button class="link" data-route="assignments"><i class='bx bx-task'></i> Assignments</button></li>
    <li><button class="link" data-route="grades"><i class='bx bx-bar-chart-alt-2'></i> Grades</button></li>
  </ul>
</nav>

<main>
  <!-- QUIZZES -->
  <div id="quizzes" class="content-section active">
    <div class="page-header">
      <h2>My Quizzes</h2>
      <p>Take available quizzes assigned by your teacher</p>
    </div>
    <div id="quizzes-list">
      <div class="loading-wrap"><div class="spinner"></div> Loading quizzes…</div>
    </div>
  </div>

  <!-- ASSIGNMENTS -->
  <div id="assignments" class="content-section">
    <div class="page-header">
      <h2>My Assignments</h2>
      <p>View and submit your assignments</p>
    </div>
    <div id="assignments-list">
      <div class="loading-wrap"><div class="spinner"></div> Loading assignments…</div>
    </div>
  </div>

  <!-- GRADES -->
  <div id="grades" class="content-section">
    <div class="page-header">
      <h2>My Grades</h2>
      <p>Review your scores and feedback</p>
    </div>
    <div id="grades-list">
      <div class="loading-wrap"><div class="spinner"></div> Loading grades…</div>
    </div>
  </div>
</main>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const fmtScore = (n) => Number.isFinite(Number(n)) ? Math.ceil(Number(n)) : 0;
  const fmtDate = (v) => {
    try {
      if (!v) return 'No due date';
      const d = new Date(v);
      if (isNaN(d)) return 'No due date';
      return d.toLocaleString('en-US', { year:'numeric', month:'short', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:true });
    } catch { return 'No due date'; }
  };

  // NAV
  const navBtns = document.querySelectorAll('.topnav .link');
  const sections = document.querySelectorAll('.content-section');
  navBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      navBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const route = btn.dataset.route;
      sections.forEach(s => s.classList.remove('active'));
      document.getElementById(route).classList.add('active');
      if (route === 'quizzes') loadQuizzes();
      if (route === 'assignments') loadAssignments();
      if (route === 'grades') loadGrades();
    });
  });

  // Initial load
  loadQuizzes();

  async function loadQuizzes() {
    const el = document.getElementById('quizzes-list');
    el.innerHTML = '<div class="loading-wrap"><div class="spinner"></div> Loading quizzes…</div>';
    try {
      const res = await fetch('/api/quizzes?kind=quiz');
      const data = await res.json();
      if (data?.success && data.items?.length) renderItems(el, data.items, 'quiz');
      else el.innerHTML = emptyState('bx-list-check', 'No Quizzes Yet', 'Your teacher hasn\'t published any quizzes yet.');
    } catch { el.innerHTML = errorBox('Failed to load quizzes'); }
  }

  async function loadAssignments() {
    const el = document.getElementById('assignments-list');
    el.innerHTML = '<div class="loading-wrap"><div class="spinner"></div> Loading assignments…</div>';
    try {
      const res = await fetch('/api/quizzes?kind=assignment');
      const data = await res.json();
      if (data?.success && data.items?.length) renderItems(el, data.items, 'assignment');
      else el.innerHTML = emptyState('bx-task', 'No Assignments Yet', 'Your teacher hasn\'t published any assignments yet.');
    } catch { el.innerHTML = errorBox('Failed to load assignments'); }
  }

  async function loadGrades() {
    const el = document.getElementById('grades-list');
    el.innerHTML = '<div class="loading-wrap"><div class="spinner"></div> Loading grades…</div>';
    try {
      const res = await fetch('/api/grades');
      const data = await res.json();
      if (!data?.items?.length) { el.innerHTML = emptyState('bx-bar-chart-alt-2', 'No Grades Yet', 'Completed quizzes and assignments will appear here.'); return; }
      const grouped = { quiz: [], assignment: [] };
      data.items.forEach(i => grouped[i.kind === 'assignment' ? 'assignment' : 'quiz'].push(i));
      el.innerHTML = renderGradeGroup('📝 Quizzes', grouped.quiz) + renderGradeGroup('📋 Assignments', grouped.assignment);
    } catch { el.innerHTML = errorBox('Failed to load grades'); }
  }

  function renderItems(container, items, type) {
    const now = new Date();
    const cards = items.map(item => {
      const settings = item.settings || {};
      const timeLimit = settings.time_limit ?? item.time_limit ?? null;
      const dueDate = settings.due_date ?? item.due_date ?? null;
      const note = settings.note || item.note || '';
      const questionsCount = item.questions_count || item.questions?.length || 0;
      const isExpired = dueDate && new Date(dueDate) < now;

      const timeText = timeLimit ? `${timeLimit} min` : 'No limit';
      const badgeClass = isExpired ? 'badge-expired' : (type === 'quiz' ? 'badge-quiz' : 'badge-assignment');
      const badgeLabel = isExpired ? '⛔ Expired' : (type === 'quiz' ? '📝 Quiz' : '📋 Assignment');
      const url = `/student/${type}/${item.id}`;
      const icon = type === 'quiz' ? 'bx-list-check' : 'bx-task';

      return `<div class="item-card">
        <div class="item-card-top">
          <div class="item-icon"><i class='bx ${icon}'></i></div>
          <span class="item-badge ${badgeClass}">${badgeLabel}</span>
        </div>
        <div class="item-title">${item.title || 'Untitled'}</div>
        <div class="item-meta">
          <div class="meta-chip"><i class='bx bx-list-ul'></i> ${questionsCount} Questions</div>
          <div class="meta-chip"><i class='bx bx-time'></i> ${timeText}</div>
          ${dueDate ? `<div class="meta-chip ${isExpired?'expired':''}"><i class='bx bx-calendar'></i> ${fmtDate(dueDate)}</div>` : ''}
        </div>
        ${note ? `<div class="item-note"><strong>Note:</strong> ${note}</div>` : ''}
        <div class="item-action">
          <a href="${url}" class="take-btn ${isExpired?'disabled':''}" ${isExpired?'onclick="return false;"':''} target="_blank">
            <i class='bx bx-play-circle'></i> ${isExpired ? 'Unavailable' : (type === 'quiz' ? 'Take Quiz' : 'Start Assignment')}
          </a>
        </div>
      </div>`;
    }).join('');
    container.innerHTML = `<div class="items-grid">${cards}</div>`;
  }

  function renderGradeGroup(title, arr) {
    if (!arr?.length) return '';
    const cards = arr.map(item => {
      const score = fmtScore(item.score);
      const max = fmtScore(item.max_score);
      const pct = max > 0 ? Math.round((score / max) * 100) : 0;
      return `<div class="grade-card">
        <div class="grade-card-top">
          <div class="grade-title">${item.title || 'Untitled'}</div>
          <div class="grade-score-badge">${score}/${max || '?'}</div>
        </div>
        <div class="grade-meta">${fmtDate(item.date)}</div>
        <div class="grade-bar"><div class="grade-bar-fill" style="width:${pct}%"></div></div>
        <a href="/student/grade/${item.id}" class="view-btn" target="_blank"><i class='bx bx-show'></i> View Details</a>
      </div>`;
    }).join('');
    return `<div class="grade-group"><div class="grade-group-title">${title}</div><div class="grade-cards">${cards}</div></div>`;
  }

  function emptyState(icon, title, msg) {
    return `<div class="empty-state"><i class='bx ${icon}'></i><h3>${title}</h3><p>${msg}</p></div>`;
  }
  function errorBox(msg) {
    return `<div class="error-box"><i class='bx bx-error-circle'></i> ${msg}. Please try again.</div>`;
  }

  window.loadAssignments = loadAssignments;
  window.loadQuizzes = loadQuizzes;
  window.loadGrades = loadGrades;
});
</script>
</body>
</html>
