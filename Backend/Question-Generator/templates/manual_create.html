<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manual Quiz Builder</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --o1: #fb9026; --o2: #ff6b35; --o3: #ffb366;
      --pale: #fff7ed; --soft: #ffe8cc; --border: #ffd9b2;
      --white: #ffffff; --surface: #fafaf8;
      --dark: #1a1207; --body: #4a4035; --muted: #9a8878;
      --card-r: 16px; --nav-h: 68px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--surface); color: var(--dark); min-height: 100vh; }

    /* TOPBAR */
    .topbar { height: var(--nav-h); padding: 0 40px; display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.96); backdrop-filter: blur(12px); border-bottom: 1px solid var(--soft); position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 20px rgba(251,144,38,0.08); }
    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .brand-mark { width: 36px; height: 36px; background: linear-gradient(135deg, var(--o1), var(--o2)); border-radius: 9px; display: flex; align-items: center; justify-content: center; }
    .brand-mark i { color: white; font-size: 18px; }
    .brand-name { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px; font-weight: 800; color: var(--dark); letter-spacing: -0.02em; }
    .brand-name span { background: linear-gradient(135deg, var(--o1), var(--o2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .btn-back { display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; background: white; border: 1.5px solid var(--soft); border-radius: 10px; font-size: 13px; font-weight: 600; color: var(--body); text-decoration: none; transition: all .2s; font-family: 'Inter', sans-serif; }
    .btn-back:hover { border-color: var(--o1); color: var(--o1); }
    .btn-save { display: inline-flex; align-items: center; gap: 7px; padding: 9px 22px; background: linear-gradient(135deg, var(--o1), var(--o2)); border: none; border-radius: 10px; font-size: 13px; font-weight: 700; color: white; cursor: pointer; transition: all .2s; font-family: 'Inter', sans-serif; box-shadow: 0 4px 14px rgba(251,144,38,0.3); }
    .btn-save:hover { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(251,144,38,0.4); }

    /* LAYOUT */
    .wrap { max-width: 860px; margin: 0 auto; padding: 36px 24px 80px; }

    /* META CARD */
    .meta-card { background: white; border: 1.5px solid var(--soft); border-radius: var(--card-r); padding: 24px 28px; margin-bottom: 20px; position: relative; overflow: hidden; }
    .meta-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--o1), var(--o2)); }
    .meta-card h2 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px; font-weight: 800; color: var(--dark); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .meta-card h2 i { color: var(--o1); }
    .meta-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .meta-row.single { grid-template-columns: 1fr; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    input[type="text"], input[type="number"], textarea, select {
      border: 1.5px solid var(--soft); border-radius: 10px; padding: 10px 14px;
      font-size: 14px; font-family: 'Inter', sans-serif; outline: none;
      background: white; color: var(--dark); transition: border-color .2s, box-shadow .2s; width: 100%;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--o1); box-shadow: 0 0 0 3px rgba(251,144,38,0.1); }
    textarea { resize: vertical; min-height: 70px; }

    /* ADD BUTTONS BAR */
    .add-bar { background: white; border: 1.5px solid var(--soft); border-radius: var(--card-r); padding: 16px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .add-bar-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-right: 4px; }
    .add-btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; background: white; border: 1.5px solid var(--soft); border-radius: 10px; font-size: 13px; font-weight: 600; color: var(--body); cursor: pointer; transition: all .2s; font-family: 'Inter', sans-serif; }
    .add-btn:hover { border-color: var(--o1); color: var(--o1); background: var(--pale); }
    .add-btn i { font-size: 16px; }
    .add-btn.mcq-btn:hover { border-color: #6366f1; color: #6366f1; background: #eef2ff; }
    .add-btn.tf-btn:hover { border-color: #0ea5e9; color: #0ea5e9; background: #e0f2fe; }
    .add-btn.sa-btn:hover { border-color: #10b981; color: #10b981; background: #d1fae5; }

    /* QUESTION CARD */
    .question-item { background: white; border: 1.5px solid var(--soft); border-radius: var(--card-r); padding: 20px 24px; margin-bottom: 14px; transition: all .25s; position: relative; overflow: hidden; animation: slideIn .2s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .question-item:hover { border-color: var(--o3); box-shadow: 0 6px 20px rgba(251,144,38,0.1); }
    .qhead { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .title-badge { font-size: 11px; font-weight: 700; color: var(--o1); background: var(--pale); border: 1px solid var(--border); border-radius: 999px; padding: 4px 12px; text-transform: uppercase; letter-spacing: 0.05em; }
    .title-badge.tf-badge { color: #0ea5e9; background: #e0f2fe; border-color: #bae6fd; }
    .title-badge.sa-badge { color: #10b981; background: #d1fae5; border-color: #a7f3d0; }
    .question-marks { width: 80px; padding: 7px 12px; border: 1.5px solid var(--soft); border-radius: 8px; font-size: 13px; font-weight: 600; color: var(--dark); background: var(--surface); text-align: center; font-family: 'Inter', sans-serif; transition: border-color .2s; }
    .question-marks:focus { border-color: var(--o1); outline: none; }
    .remove-btn { margin-left: auto; display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; background: white; border: 1.5px solid #fee2e2; border-radius: 8px; font-size: 12px; font-weight: 600; color: #ef4444; cursor: pointer; transition: all .2s; font-family: 'Inter', sans-serif; }
    .remove-btn:hover { background: #fee2e2; border-color: #ef4444; }
    .prompt { width: 100%; border: 1.5px solid var(--soft); border-radius: 10px; padding: 11px 14px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; color: var(--dark); resize: vertical; min-height: 66px; transition: border-color .2s, box-shadow .2s; }
    .prompt:focus { border-color: var(--o1); box-shadow: 0 0 0 3px rgba(251,144,38,0.1); }
    .prompt::placeholder { color: var(--muted); }
    .opt { display: flex; gap: 10px; align-items: center; margin: 8px 0; padding: 10px 14px; background: var(--surface); border: 1.5px solid var(--soft); border-radius: 10px; transition: all .2s; }
    .opt:hover { border-color: var(--o3); background: var(--pale); }
    .opt input[type="checkbox"], .opt input[type="radio"] { accent-color: var(--o1); width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
    .opt input[type="text"] { flex: 1; border: none; background: transparent; padding: 0; font-size: 14px; color: var(--dark); outline: none; }
    .opt input[type="text"]::placeholder { color: var(--muted); }
    .opt label { font-size: 14px; color: var(--body); cursor: pointer; }
    .btn-add-opt { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; background: white; border: 1.5px dashed var(--o3); border-radius: 8px; font-size: 12px; font-weight: 600; color: var(--o1); cursor: pointer; transition: all .2s; font-family: 'Inter', sans-serif; margin-top: 6px; }
    .btn-add-opt:hover { background: var(--pale); border-color: var(--o1); }

    /* SIMILAR QUESTIONS PANEL */
    .similar-questions-panel { background: linear-gradient(135deg, var(--pale), var(--soft)); border: 1.5px solid var(--border); border-radius: 12px; padding: 16px 20px; margin-top: 12px; animation: slideIn .2s ease; }
    .similar-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; color: #92400e; font-weight: 700; font-size: 13px; }
    .close-similar { margin-left: auto; background: none; border: none; font-size: 20px; cursor: pointer; color: #92400e; line-height: 1; padding: 0; }
    .close-similar:hover { color: #78350f; }
    .similar-subtitle { font-size: 13px; color: #78350f; margin-bottom: 10px; }
    .similar-list { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
    .similar-item { background: white; border-radius: 8px; padding: 10px 14px; position: relative; overflow: hidden; }
    .similarity-bar { position: absolute; top: 0; left: 0; height: 100%; background: linear-gradient(90deg, rgba(251,144,38,0.1), transparent); z-index: 0; }
    .similar-content { position: relative; z-index: 1; }
    .similarity-score { display: inline-block; background: linear-gradient(135deg, var(--o1), var(--o2)); color: white; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; margin-bottom: 5px; }
    .similar-text { margin: 5px 0 3px; font-size: 13px; color: var(--dark); font-weight: 500; }
    .similar-reason { color: var(--muted); font-size: 12px; font-style: italic; }
    .continue-anyway { width: 100%; padding: 9px; background: white; border: 1.5px solid var(--o1); border-radius: 8px; color: var(--o1); font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; font-family: 'Inter', sans-serif; }
    .continue-anyway:hover { background: var(--o1); color: white; }

    /* EMPTY STATE */
    .empty-hint { text-align: center; padding: 40px 24px; background: white; border: 1.5px dashed var(--soft); border-radius: var(--card-r); color: var(--muted); font-size: 14px; }
    .empty-hint i { font-size: 36px; color: var(--border); display: block; margin-bottom: 10px; }

    /* TOAST */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--dark); color: white; padding: 11px 22px; border-radius: 12px; font-size: 14px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.2); display: none; z-index: 500; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--pale); }
    ::-webkit-scrollbar-thumb { background: var(--o3); border-radius: 99px; }

    @media (max-width: 720px) {
      .topbar { padding: 0 16px; }
      .meta-row { grid-template-columns: 1fr; }
      .add-bar { flex-direction: column; align-items: flex-start; }
      .topbar-right { gap: 6px; }
      .btn-back span { display: none; }
    }
  </style>
</head>
<body>

<nav class="topbar">
  <a class="brand" href="{{ url_for('teacher.teacher_generate') }}">
    <div class="brand-mark"><i class='bx bx-brain'></i></div>
    <div class="brand-name">Quiz<span>Gen AI</span></div>
  </a>
  <div class="topbar-right">
    <a class="btn-back" href="{{ url_for('teacher.teacher_generate') }}"><i class='bx bx-arrow-back'></i> <span>Dashboard</span></a>
    <button id="save" class="btn-save"><i class='bx bx-save'></i> Save Quiz</button>
  </div>
</nav>

<div class="wrap">
  <!-- META INFO CARD -->
  <div class="meta-card">
    <h2><i class='bx bx-edit-alt'></i> Quiz Details</h2>
    <div class="meta-row">
      <div class="field">
        <label>Quiz Title</label>
        <input id="title" type="text" placeholder="Enter a descriptive quiz title…" />
      </div>
      <div class="field">
        <label>Time Limit (seconds, optional)</label>
        <input id="timeLimit" type="number" placeholder="e.g. 1800" min="0" />
      </div>
    </div>
    <div class="meta-row single" style="margin-top: 12px;">
      <div class="field">
        <label>Description (optional)</label>
        <textarea id="desc" placeholder="Add instructions or a brief description for students…"></textarea>
      </div>
    </div>
  </div>

  <!-- ADD QUESTION BAR -->
  <div class="add-bar">
    <span class="add-bar-label">Add Question</span>
    <button id="addMCQ" class="add-btn mcq-btn"><i class='bx bx-list-check'></i> Multiple Choice</button>
    <button id="addTF" class="add-btn tf-btn"><i class='bx bx-toggle-left'></i> True / False</button>
    <button id="addSA" class="add-btn sa-btn"><i class='bx bx-text'></i> Short Answer</button>
  </div>

  <!-- QUESTIONS LIST -->
  <div id="questions">
    <div class="empty-hint">
      <i class='bx bx-plus-circle'></i>
      No questions yet. Use the buttons above to add your first question.
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="{{ url_for('static', filename='manual.js') }}"></script>
</body>
</html>
