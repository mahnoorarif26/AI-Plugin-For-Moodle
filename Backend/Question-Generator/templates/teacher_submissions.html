<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submissions: {{ quiz_title }}</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --o1: #fb9026; --o2: #ff6b35; --o3: #ffb366;
      --pale: #fff7ed; --soft: #ffe8cc; --border: #ffd9b2;
      --white: #ffffff; --surface: #fafaf8;
      --dark: #1a1207; --body: #4a4035; --muted: #9a8878;
      --card-r: 18px; --nav-h: 68px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--surface); color: var(--dark); min-height: 100vh; }

    .topbar { height: var(--nav-h); padding: 0 40px; display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.96); backdrop-filter: blur(12px); border-bottom: 1px solid var(--soft); position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 20px rgba(251,144,38,0.08); }
    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .brand-mark { width: 36px; height: 36px; background: linear-gradient(135deg, var(--o1), var(--o2)); border-radius: 9px; display: flex; align-items: center; justify-content: center; }
    .brand-mark i { color: white; font-size: 18px; }
    .brand-name { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px; font-weight: 800; color: var(--dark); letter-spacing: -0.02em; }
    .brand-name span { background: linear-gradient(135deg, var(--o1), var(--o2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .btn-back { display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; background: white; border: 1.5px solid var(--soft); border-radius: 10px; font-size: 13px; font-weight: 600; color: var(--body); text-decoration: none; cursor: pointer; transition: all .2s; font-family: 'Inter', sans-serif; }
    .btn-back:hover { border-color: var(--o1); color: var(--o1); }

    main { max-width: 960px; margin: 0 auto; padding: 40px 24px 80px; }

    /* PAGE HEADER */
    .page-header { background: white; border: 1.5px solid var(--soft); border-radius: var(--card-r); padding: 28px 32px; margin-bottom: 24px; position: relative; overflow: hidden; }
    .page-header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--o1), var(--o2)); }
    .page-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--pale); border: 1px solid var(--border); border-radius: 999px; padding: 5px 12px; font-size: 11px; font-weight: 700; color: #92400e; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 12px; }
    .page-header h1 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 24px; font-weight: 800; color: var(--dark); letter-spacing: -0.025em; margin-bottom: 12px; }
    .meta-row { display: flex; flex-wrap: wrap; gap: 12px; }
    .meta-chip { display: inline-flex; align-items: center; gap: 6px; background: var(--surface); border: 1px solid var(--soft); border-radius: 8px; padding: 5px 12px; font-size: 12px; color: var(--body); font-weight: 500; }
    .meta-chip i { color: var(--o1); font-size: 14px; }

    /* STATS ROW */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: white; border: 1.5px solid var(--soft); border-radius: var(--card-r); padding: 20px 24px; text-align: center; transition: all .25s; }
    .stat-card:hover { border-color: var(--o3); box-shadow: 0 6px 20px rgba(251,144,38,0.1); }
    .stat-val { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 36px; font-weight: 900; color: var(--o1); line-height: 1; }
    .stat-lbl { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-top: 5px; }

    /* TABLE SECTION */
    .table-section { background: white; border: 1.5px solid var(--soft); border-radius: var(--card-r); overflow: hidden; }
    .table-head { padding: 18px 24px; border-bottom: 1px solid var(--soft); display: flex; align-items: center; gap: 10px; }
    .table-head h2 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px; font-weight: 800; color: var(--dark); }
    .table-head i { color: var(--o1); font-size: 20px; }
    .table-wrapper { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--surface); }
    th { padding: 12px 20px; text-align: left; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; border-bottom: 1px solid var(--soft); }
    td { padding: 14px 20px; border-bottom: 1px solid var(--surface); font-size: 14px; vertical-align: middle; }
    tbody tr { transition: background .15s; }
    tbody tr:hover { background: var(--pale); }
    tbody tr:last-child td { border-bottom: none; }

    /* CELL STYLES */
    .student-name { font-weight: 600; color: var(--dark); display: flex; align-items: center; gap: 8px; }
    .student-name i { color: var(--o1); font-size: 18px; }
    .roll-pill { display: inline-flex; align-items: center; gap: 5px; background: #d1fae5; color: #065f46; border-radius: 999px; padding: 4px 12px; font-size: 12px; font-weight: 700; }
    .email-cell { color: var(--muted); font-size: 13px; display: flex; align-items: center; gap: 6px; }
    .email-cell i { color: var(--o3); font-size: 14px; }
    .action-btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 16px; background: linear-gradient(135deg, var(--o1), var(--o2)); color: white; border: none; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all .2s; font-family: 'Inter', sans-serif; }
    .action-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(251,144,38,0.3); }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 80px 24px; }
    .empty-state i { font-size: 52px; color: var(--border); margin-bottom: 16px; display: block; }
    .empty-state h3 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 18px; font-weight: 800; color: var(--dark); margin-bottom: 8px; }
    .empty-state p { color: var(--muted); font-size: 14px; }

    /* LOADING */
    .loading-state { text-align: center; padding: 60px 24px; }
    .spinner { width: 48px; height: 48px; border: 3px solid var(--soft); border-top-color: var(--o1); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state p { color: var(--muted); font-size: 14px; font-weight: 500; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--pale); }
    ::-webkit-scrollbar-thumb { background: var(--o3); border-radius: 99px; }

    @media (max-width: 768px) {
      .topbar { padding: 0 20px; }
      main { padding: 24px 16px 60px; }
      .stats-row { grid-template-columns: 1fr; }
      thead { display: none; }
      tbody tr { display: block; padding: 14px; border-bottom: 1px solid var(--soft); }
      td { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border: none; font-size: 13px; }
      td::before { content: attr(data-label); font-weight: 700; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
    }
  </style>
</head>
<body>

<nav class="topbar">
  <a class="brand" href="/teacher/generate">
    <div class="brand-mark"><i class='bx bx-brain'></i></div>
    <div class="brand-name">Quiz<span>Gen AI</span></div>
  </a>
  <a class="btn-back" href="/teacher/generate"><i class='bx bx-arrow-back'></i> Dashboard</a>
</nav>

<main>
  <div class="page-header">
    <div class="page-badge"><i class='bx bx-file-blank'></i> Quiz Submissions</div>
    <h1>{{ quiz_title }}</h1>
    <div class="meta-row">
      <div class="meta-chip"><i class='bx bx-hash'></i> ID: {{ quiz_id }}</div>
      <div class="meta-chip"><i class='bx bx-refresh'></i> Auto-refreshes every 30s</div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-val" id="total-submissions">—</div>
      <div class="stat-lbl">Total Submissions</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-latest">—</div>
      <div class="stat-lbl">Latest Submission</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-status">Live</div>
      <div class="stat-lbl">Status</div>
    </div>
  </div>

  <div class="table-section">
    <div class="table-head">
      <i class='bx bx-group'></i>
      <h2>Student Submissions</h2>
    </div>
    <div id="submissions-content">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Loading submissions…</p>
      </div>
    </div>
  </div>
</main>

<script>
  const quizId = "{{ quiz_id }}";
  let refreshInterval;

  document.addEventListener('DOMContentLoaded', () => {
    loadSubmissions();
    refreshInterval = setInterval(loadSubmissions, 30000);
  });

  async function loadSubmissions() {
    try {
      const res = await fetch(`/api/quizzes/${quizId}/submissions`);
      const data = await res.json();
      if (data.success && data.submissions) {
        displaySubmissions(data.submissions);
      } else {
        showEmptyState();
      }
    } catch (err) {
      console.error(err);
      showEmptyState();
    }
  }

  function displaySubmissions(submissions) {
    const container = document.getElementById('submissions-content');
    document.getElementById('total-submissions').textContent = submissions.length;

    if (!submissions.length) { showEmptyState(); return; }

    // Latest submission time
    const sorted = [...submissions].sort((a,b) => new Date(b.submitted_at||0) - new Date(a.submitted_at||0));
    const latestTime = sorted[0]?.submitted_at ? new Date(sorted[0].submitted_at).toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'}) : '—';
    document.getElementById('stat-latest').textContent = latestTime;

    container.innerHTML = `
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Student</th>
              <th>Roll No.</th>
              <th>Email</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            ${submissions.map((sub, i) => `
              <tr>
                <td data-label="#">${i + 1}</td>
                <td data-label="Student">
                  <div class="student-name">
                    <i class='bx bx-user-circle'></i>
                    ${escapeHtml(sub.student_name || 'Unknown')}
                  </div>
                </td>
                <td data-label="Roll No.">
                  <span class="roll-pill"><i class='bx bx-id-card'></i>${escapeHtml(sub.roll_no || 'N/A')}</span>
                </td>
                <td data-label="Email">
                  <div class="email-cell"><i class='bx bx-envelope'></i>${escapeHtml(sub.student_email || 'N/A')}</div>
                </td>
                <td data-label="Action">
                  <button class="action-btn" onclick="viewGradeDetail('${escapeHtml(sub.id)}')">
                    <i class='bx bx-show'></i> View Grade
                  </button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>`;
  }

  function showEmptyState() {
    document.getElementById('total-submissions').textContent = '0';
    document.getElementById('submissions-content').innerHTML = `
      <div class="empty-state">
        <i class='bx bx-inbox'></i>
        <h3>No Submissions Yet</h3>
        <p>Students haven't submitted this quiz yet. Check back soon.</p>
      </div>`;
  }

  function viewGradeDetail(subId) {
    window.open(`/student/grade/${subId}?origin=teacher`, '_blank');
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
